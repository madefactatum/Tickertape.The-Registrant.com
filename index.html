<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deals</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ticker-bg: #0f0f0f;
    --ticker-text: #c8c0b0;
    --ticker-accent: #a89070;
  }
  html, body {
    background: var(--ticker-bg);
    overflow: hidden;
    height: 37px;
    width: 100%;
  }
  .ticker-wrap {
    background: var(--ticker-bg);
    color: var(--ticker-text);
    height: 37px;
    overflow: hidden;
    display: flex;
    align-items: center;
    width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    font-weight: 300;
    position: relative;
  }
  .ticker-label {
    flex-shrink: 0;
    padding: 0 19px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ticker-accent);
    border-right: 1px solid #333;
    height: 100%;
    display: flex;
    align-items: center;
    background: var(--ticker-bg);
    z-index: 2;
  }
  .ticker-track {
    display: flex;
    white-space: nowrap;
    animation: ticker 60s linear infinite;
    font-size: 14px;
    letter-spacing: 0.03em;
    will-change: transform;
  }
  .sep { color: var(--ticker-accent); padding: 0 12px; }
  @keyframes ticker {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-wrap::after {
    content: '';
    position: absolute;
    right: 0; top: 0;
    width: 60px; height: 100%;
    background: linear-gradient(to right, transparent, var(--ticker-bg));
    pointer-events: none;
    z-index: 3;
  }
</style>
</head>
<body>
<div class="ticker-wrap">
  <div class="ticker-label">Deals</div>
  <div class="ticker-track" id="ticker-track">
    <span style="padding:0 16px;color:var(--ticker-text);font-size:12px;">Loading&hellip;</span>
  </div>
</div>

<script>
// Single EDGAR full-text search query combining all merger form types
// Uses the EDGAR EFTS search UI endpoint which is publicly accessible
const URL = '/.netlify/functions/edgar';

async function safeFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
  return res.json();
}

function parseHits(json, label) {
  const hits = json?.hits?.hits || [];
  return hits.map(h => {
    const src = h._source || {};
    const id = h._id || '';
    const accession = id.split(':')[0];
    const cik = parseInt(accession.split('-')[0], 10);
    const acc = accession.replace(/-/g, '');
    const link = (cik && acc)
      ? `https://www.sec.gov/Archives/edgar/data/${cik}/${acc}/`
      : 'https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&type=S-4';
    return {
      type: src.form_type || label,
      company: src.entity_name || 'Unknown',
      date: (src.file_date || '').slice(0, 10),
      link
    };
  });
}

async function buildTicker() {
  const track = document.getElementById('ticker-track');
  let filings = [];

  try {
    const res = await fetch(URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    filings = parseHits(json, 'Filing');
  } catch(err) {
    console.error('Fetch error:', err);
    track.innerHTML = `<span style="padding:0 16px;color:#666;font-size:11px;">Feed unavailable — ${err.message}</span>`;
    return;
  }

  if (filings.length === 0) {
    track.innerHTML = '<span style="padding:0 16px;color:#666;font-size:11px;">No recent filings found.</span>';
    return;
  }

  filings.sort((a, b) => b.date.localeCompare(a.date));

  // Deduplicate
  const seen = new Set();
  const unique = filings.filter(f => {
    const key = `${f.type}|${f.company}|${f.date}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  const html = unique.map(f =>
    `<span style="padding:0 8px;">` +
    `<a href="${f.link}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;">` +
    `<span style="color:var(--ticker-accent);font-size:10px;letter-spacing:0.14em;margin-right:5px;">${f.type}</span>` +
    `${f.company}` +
    `<span style="color:#444;font-size:10px;margin-left:8px;">${f.date}</span>` +
    `</a></span><span class="sep">&#9670;</span>`
  ).join('');

  track.innerHTML = `<span style="display:flex;align-items:center;">${html}</span>`.repeat(2);
  track.style.animationDuration = `${Math.max(60, unique.length * 5)}s`;
}

buildTicker();
setInterval(buildTicker, 60 * 60 * 1000);
</script>
</body>
</html>
